<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#080810" />
  <title>Chladni — クラドニ図形</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="app">

    <!-- ===== Canvas ===== -->
    <section id="stage">
      <canvas id="canvas"></canvas>
      <div id="rec-badge" class="hidden">● REC</div>
    </section>

    <!-- ===== Control Panel ===== -->
    <section id="panel">

      <header id="app-header">
        <div class="header-title">
          <h1>Chladni</h1>
          <p>クラドニ図形 ビジュアライザー</p>
        </div>
        <button id="btn-anim" class="btn-anim" title="アニメーション 再生/停止">
          <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          <svg id="icon-play"  viewBox="0 0 24 24" fill="currentColor" class="hidden"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
      </header>

      <div id="hud">
        <span id="hud-freq">440 Hz</span>
        <span id="hud-mn">m=2 n=3</span>
        <span id="hud-fps">— fps</span>
      </div>

      <!-- 板の形状 -->
      <div class="group">
        <h2 class="group-title">板の形状</h2>
        <div class="inst-grid" id="shape-row">
          <button class="inst-btn active" data-shape="square">⬛ 正方形</button>
          <button class="inst-btn" data-shape="circle">⚫ 円形</button>
        </div>
        <div class="ctrl" style="margin-top:10px">
          <div class="ctrl-label"><span>板の大きさ</span></div>
          <div class="inst-grid" id="scale-row">
            <button class="inst-btn" data-scale="large">大（線少）</button>
            <button class="inst-btn active" data-scale="medium">標準</button>
            <button class="inst-btn" data-scale="small">小（線多）</button>
          </div>
        </div>
        <p class="hint">自由端の薄板を物理モデルで再現。周波数を上げるほど節線が増えます。</p>
      </div>

      <!-- パラメータ -->
      <div class="group">
        <h2 class="group-title">パラメータ</h2>

        <div class="ctrl">
          <div class="ctrl-label"><span>周波数</span><span class="unit">Hz</span></div>
          <div class="ctrl-row">
            <input type="range"  id="freq-range"  min="50"  max="2000"  step="1"   value="440" />
            <input type="number" id="freq-num"    min="50"  max="2000"  step="1"   value="440" />
          </div>
        </div>

        <div class="ctrl">
          <div class="ctrl-label"><span>粒子数</span></div>
          <div class="ctrl-row">
            <input type="range"  id="count-range" min="500" max="40000" step="500" value="12000" />
            <input type="number" id="count-num"   min="500" max="40000" step="500" value="12000" />
          </div>
        </div>

        <div class="ctrl">
          <div class="ctrl-label"><span>振動の強さ</span></div>
          <div class="ctrl-row">
            <input type="range"  id="vibr-range"  min="0"   max="100"   step="1"   value="45" />
            <input type="number" id="vibr-num"    min="0"   max="100"   step="1"   value="45" />
          </div>
        </div>
      </div>

      <!-- 表示 -->
      <div class="group">
        <h2 class="group-title">表示</h2>
        <div class="ctrl-label" style="margin-bottom:6px"><span>描画モード</span></div>
        <div class="inst-grid" id="drawmode-row">
          <button class="inst-btn" data-drawmode="particles">粒子</button>
          <button class="inst-btn active" data-drawmode="lines">節線</button>
        </div>
      </div>

      <!-- 録画 -->
      <div class="group">
        <h2 class="group-title">録画・保存</h2>
        <div class="rec-grid">
          <button id="btn-record">⏺ 録画開始</button>
          <button id="btn-snapshot">📷 画像保存</button>
        </div>
      </div>

    </section>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
